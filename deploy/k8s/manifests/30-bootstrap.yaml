apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: __NAMESPACE__
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - until busybox nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
      - name: wait-clickhouse
        image: busybox:1.36
        command:
        - sh
        - -c
        - until busybox nc -z clickhouse 8123; do echo waiting for clickhouse; sleep 2; done
      containers:
      - name: migrate
        image: __IMAGE_REGISTRY_BASE__/evalsmith-eval-engine:__IMAGE_TAG__
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: evalsmith-config
        - secretRef:
            name: evalsmith-secrets
        command:
        - python
        - /app/scripts/migrate_dev_stack.py
---
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-evaluators
  namespace: __NAMESPACE__
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: seed-evaluators
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - until busybox nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
      containers:
      - name: seed-evaluators
        image: __IMAGE_REGISTRY_BASE__/evalsmith-eval-engine:__IMAGE_TAG__
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: evalsmith-config
        - secretRef:
            name: evalsmith-secrets
        command:
        - python
        - -m
        - app.scripts.seed_builtin_evaluators
