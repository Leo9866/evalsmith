apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: __NAMESPACE__
spec:
  selector:
    app: gateway
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      initContainers:
      - name: wait-auth
        image: busybox:1.36
        command:
        - sh
        - -c
        - until busybox nc -z auth-service 8004; do echo waiting for auth-service; sleep 2; done
      - name: wait-trace
        image: busybox:1.36
        command:
        - sh
        - -c
        - until busybox nc -z trace-service 8001; do echo waiting for trace-service; sleep 2; done
      - name: wait-dataset
        image: busybox:1.36
        command:
        - sh
        - -c
        - until busybox nc -z dataset-service 8003; do echo waiting for dataset-service; sleep 2; done
      - name: wait-annotation
        image: busybox:1.36
        command:
        - sh
        - -c
