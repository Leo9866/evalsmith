apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: __NAMESPACE__
spec:
  selector:
    app: auth-service
  ports:
  - name: http
    port: 8004
    targetPort: 8004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
      - name: wait-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - until busybox nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
      containers:
      - name: auth-service
        image: __IMAGE_REGISTRY_BASE__/evalsmith-auth-service:__IMAGE_TAG__
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: evalsmith-config
        - secretRef:
            name: evalsmith-secrets
        env:
        - name: SERVER_PORT
          value: "8004"
        ports:
        - containerPort: 8004
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 20
          periodSeconds: 10
---
