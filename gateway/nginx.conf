upstream auth_service {
    server 127.0.0.1:8004;
}
upstream trace_service {
    server 127.0.0.1:8001;
}
upstream dataset_service {
    server 127.0.0.1:8003;
}
upstream eval_engine {
    server 127.0.0.1:8002;
}
upstream annotation_service {
    server 127.0.0.1:8005;
}
upstream monitor_service {
    server 127.0.0.1:8006;
}
upstream web_frontend {
    server 127.0.0.1:3000;
}

server {
    listen 8080;
    server_name localhost;

    # Frontend
    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Auth Service
    location /api/v1/auth/ {
        proxy_pass http://auth_service;
    }
    location /api/v1/projects {
        proxy_pass http://auth_service;
    }
    location /api/v1/api-keys {
        proxy_pass http://auth_service;
    }

    # Trace Service
    location /api/v1/traces {
        proxy_pass http://trace_service;
    }
    location /api/v1/spans {
        proxy_pass http://trace_service;
    }

    # Dataset Service
    location /api/v1/datasets {
        proxy_pass http://dataset_service;
    }

    # Annotation Service
    location /api/v1/annotation {
        proxy_pass http://annotation_service;
    }

    # Eval Engine
    location /api/v1/evaluators {
        proxy_pass http://eval_engine;
    }
    location /api/v1/experiments {
        proxy_pass http://eval_engine;
    }
    location /api/v1/evaluate {
        proxy_pass http://eval_engine;
    }

    # Monitor Service
    location /api/v1/monitoring {
        proxy_pass http://monitor_service;
    }
}
